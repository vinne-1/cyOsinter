services:
  db:
    image: postgres:16
    container_name: cyshield-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-cyshield}
    ports:
      - "5432:5432"
    volumes:
      - cyshield_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cyshield"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama
    container_name: cyshield-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  app:
    build: .
    image: cybershield-pro:latest
    container_name: cyshield-app
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-cyshield}
      PORT: 5000
      NODE_ENV: production
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_ENABLED: ${OLLAMA_ENABLED:-0}
    depends_on:
      db:
        condition: service_healthy
    # Optional: create .env with ABUSEIPDB_API_KEY, VIRUSTOTAL_API_KEY, TAVILY_API_KEY, NVD_API_KEY, POSTGRES_PASSWORD and uncomment:
    # env_file: .env

volumes:
  cyshield_db_data:
  ollama_data:

