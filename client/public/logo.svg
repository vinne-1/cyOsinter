<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <!-- Outer glow filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle inner glow -->
    <filter id="softglow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Radial gradient for background fill -->
    <radialGradient id="bgGrad" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#0d1f2d"/>
      <stop offset="100%" stop-color="#060e14"/>
    </radialGradient>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0077aa" stop-opacity="0.10"/>
    </linearGradient>
    <!-- Cyan stroke gradient -->
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00e5ff"/>
      <stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
  </defs>

  <!-- Dark background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bgGrad)" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Shield body -->
  <path d="M100 22 L160 50 L160 105 Q160 148 100 178 Q40 148 40 105 L40 50 Z"
        fill="url(#shieldGrad)"
        stroke="url(#cyanGrad)"
        stroke-width="2.5"
        filter="url(#glow)"
        stroke-linejoin="round"/>

  <!-- Shield inner border highlight -->
  <path d="M100 33 L151 57 L151 106 Q151 142 100 168 Q49 142 49 106 L49 57 Z"
        fill="none"
        stroke="#00e5ff"
        stroke-width="0.6"
        stroke-opacity="0.3"
        stroke-linejoin="round"/>

  <!-- Radar rings -->
  <circle cx="100" cy="100" r="38" fill="none" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.2"/>
  <circle cx="100" cy="100" r="26" fill="none" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.25"/>
  <circle cx="100" cy="100" r="14" fill="none" stroke="#00e5ff" stroke-width="0.8" stroke-opacity="0.3"/>

  <!-- Crosshair lines -->
  <line x1="100" y1="58" x2="100" y2="142" stroke="#00e5ff" stroke-width="0.7" stroke-opacity="0.2"/>
  <line x1="58" y1="100" x2="142" y2="100" stroke="#00e5ff" stroke-width="0.7" stroke-opacity="0.2"/>

  <!-- Radar sweep arc (pie slice) -->
  <path d="M100 100 L138 72 A38 38 0 0 1 138 128 Z"
        fill="#00e5ff"
        fill-opacity="0.08"
        filter="url(#softglow)"/>
  <path d="M100 100 L138 72 A38 38 0 0 1 138 128 Z"
        fill="none"
        stroke="#00e5ff"
        stroke-width="1"
        stroke-opacity="0.5"/>

  <!-- Eye pupil / center dot -->
  <circle cx="100" cy="100" r="5.5" fill="#00e5ff" filter="url(#glow)" opacity="0.95"/>
  <circle cx="100" cy="100" r="2.5" fill="#ffffff" opacity="0.9"/>

  <!-- Scan dot on outer ring (at sweep edge) -->
  <circle cx="138" cy="100" r="3" fill="#00e5ff" filter="url(#glow)" opacity="0.85"/>

  <!-- Tick marks on outer ring -->
  <line x1="100" y1="60" x2="100" y2="65" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="100" y1="135" x2="100" y2="140" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="60"  y1="100" x2="65"  y2="100" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.6"/>
  <line x1="135" y1="100" x2="140" y2="100" stroke="#00e5ff" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- Bottom text: cy -->
  <text x="100" y="158"
        font-family="'Courier New', Courier, monospace"
        font-size="13"
        font-weight="700"
        fill="#00e5ff"
        text-anchor="middle"
        filter="url(#softglow)"
        letter-spacing="3"
        opacity="0.9">cyOsinter</text>
</svg>
